services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_change_me}
      POSTGRES_DB: sentinel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sentinel:${POSTGRES_PASSWORD:-sentinel_change_me}@db:5432/sentinel
      SESSION_SECRET: ${SESSION_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      AI_INTEGRATIONS_OPENROUTER_BASE_URL: ${AI_INTEGRATIONS_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      AI_INTEGRATIONS_OPENROUTER_API_KEY: ${AI_INTEGRATIONS_OPENROUTER_API_KEY}
      NODE_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:80"

volumes:
  postgres_data:
